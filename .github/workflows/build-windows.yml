name: Build Windows EXE & MSI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Download JavaFX SDK
        run: |
          Invoke-WebRequest -Uri "https://download2.gluonhq.com/openjfx/21.0.11/openjfx-21.0.11_windows-x64_bin_sdk.zip" -OutFile javafx.zip
          Expand-Archive javafx.zip -DestinationPath .

      - name: Build with jpackage (EXE + MSI)
        run: |
          $fx = "openjfx-21.0.11_windows-x64_bin_sdk/lib"
          
          # ساخت EXE
          jpackage `
            --type exe `
            --input out/artifacts/RadioVoiceMailPlayer_jar `
            --main-jar RadioVoiceMailPlayer.jar `
            --main-class RadioVoiceMailPlayer `
            --name "RadioVoiceMailPlayer" `
            --app-version 2.1 `
            --win-shortcut `
            --win-menu `
            --dest output `
            --module-path $fx `
            --add-modules javafx.controls,javafx.fxml,javafx.media
          
          # ساخت MSI
          jpackage `
            --type msi `
            --input out/artifacts/RadioVoiceMailPlayer_jar `
            --main-jar RadioVoiceMailPlayer.jar `
            --main-class RadioVoiceMailPlayer `
            --name "RadioVoiceMailPlayer" `
            --app-version 2.1 `
            --win-shortcut `
            --win-menu `
            --dest output `
            --module-path $fx `
            --add-modules javafx.controls,javafx.fxml,javafx.media
        shell: pwsh

      - name: Upload Installers
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installers
          path: output/